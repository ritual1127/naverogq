<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 110" width="1600" height="110" role="img" aria-label="CADSCAN — Cloudflare Workers AI 기반, 결과는 참고용이며 최종 검토는 담당자가 수행하세요">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0e18"/>
      <stop offset="1" stop-color="#070912"/>
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#00f0ff"/>
    </linearGradient>
    <pattern id="grid2" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#a855f7" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="110" fill="url(#bgGrad2)"/>
  <rect width="1600" height="110" fill="url(#grid2)"/>
  <rect x="0" y="0" width="1600" height="2" fill="url(#accentGrad2)" opacity="0.6"/>

  <g font-family="Consolas, 'Malgun Gothic', monospace">
    <text x="800" y="62" text-anchor="middle" font-size="18" letter-spacing="0.4" fill="#7b8496">
      <tspan fill="#eef1f8" font-weight="700" letter-spacing="1">CADSCAN</tspan><tspan> — Cloudflare Workers AI 기반 · 결과는 참고용이며 최종 검토는 담당자가 수행하세요</tspan>
    </text>
  </g>
</svg>
