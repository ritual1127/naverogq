<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 160" width="1600" height="160" role="img" aria-label="NEW: DWG 업로드 시 Autodesk APS 뷰어로 3D 시각화 지원">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070912"/>
      <stop offset="1" stop-color="#0e1220"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0" cy="0.5" r="0.9">
      <stop offset="0" stop-color="#00f0ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="1" cy="0.5" r="0.9">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#00f0ff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="160" fill="url(#bgGrad)"/>
  <rect width="1600" height="160" fill="url(#grid)"/>
  <rect width="1600" height="160" fill="url(#glowL)"/>
  <rect width="1600" height="160" fill="url(#glowR)"/>
  <rect x="0" y="157" width="1600" height="3" fill="url(#accentGrad)" opacity="0.7"/>

  <g transform="translate(84,80)">
    <polygon points="32,2 60,17 60,47 32,62 4,47 4,17" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" transform="translate(-32,-32)"/>
    <path d="M-17,0 L17,0" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M-17,-9 L-17,9 M17,-9 L17,9 M-8,-5 L-8,5 M8,-5 L8,5 M0,-7 L0,7" stroke="url(#accentGrad)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3" fill="#00f0ff"/>
  </g>

  <g font-family="Consolas, 'Malgun Gothic', monospace" filter="url(#softGlow)">
    <text x="820" y="70" text-anchor="middle" font-size="26" font-weight="700" letter-spacing="1" fill="#00f0ff">&gt; NEW</text>
    <text x="820" y="106" text-anchor="middle" font-size="26" letter-spacing="0.5" fill="#eef1f8">DWG 업로드 시 Autodesk APS 뷰어로 3D 시각화 지원</text>
  </g>
</svg>
